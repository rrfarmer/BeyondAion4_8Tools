name: aion-portal

services:
  portal:
    build:
      context: .
    container_name: aion-portal
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-change-before-sharing}
      PORTAL_REGISTRATION_CODE: ${PORTAL_REGISTRATION_CODE:-}
      DATA_DIR: /app/data
      AION_REPO_ROOT: /aion-server
      BEYOND_AION_SHARP_REPO_ROOT: /beyond-aion-sharp
      LOGIN_DB_HOST: mysql
      LOGIN_DB_PORT: 3306
      LOGIN_DB_USER: ${DB_USER:-root}
      LOGIN_DB_PASSWORD: ${DB_PASSWORD:-aion}
      LOGIN_DB_NAME: aion_ls
      GAME_DB_HOST: mysql
      GAME_DB_PORT: 3306
      GAME_DB_USER: ${DB_USER:-root}
      GAME_DB_PASSWORD: ${DB_PASSWORD:-aion}
      GAME_DB_NAME: aion_gs
      # Deliver mail through the LIVE game server (so online recipients get an instant bell + icon) instead of
      # writing to the DB directly. Reachable on the shared aion_default network; token must match the game
      # server's ADMIN_API_TOKEN (GAMESERVER_ADMIN_API_TOKEN).
      GAME_SERVER_ADMIN_URL: ${GAME_SERVER_ADMIN_URL:-http://gameserver:7780}
      GAME_SERVER_ADMIN_TOKEN: ${ADMIN_API_TOKEN:-change-me-admin-token}
    ports:
      - "${PORTAL_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - ../aion-server:/aion-server:ro
      # The spawn directory is writable so repository XML changes survive for the next game-server build.
      - ../BeyondAionSharp/game-server/data/static_data/spawns/Npcs:/beyond-aion-sharp/game-server/data/static_data/spawns/Npcs
      - ../BeyondAionSharp/game-server/data/static_data/spawns/Instances:/beyond-aion-sharp/game-server/data/static_data/spawns/Instances
      # NPC templates are needed for names/search but are never changed by the spawn editor.
      - ../BeyondAionSharp/game-server/data/static_data/npcs:/beyond-aion-sharp/game-server/data/static_data/npcs:ro
      # Walker routes are writable so reviewed patrol edits persist for the next game-server build.
      - ../BeyondAionSharp/game-server/data/static_data/npc_walker:/beyond-aion-sharp/game-server/data/static_data/npc_walker
      # Prepared 16-bit terrain heightmaps provide ground Z defaults and are never modified by the portal.
      - ../BeyondAionSharp/game-server/data/geo:/beyond-aion-sharp/game-server/data/geo:ro
    networks:
      - aion_default

networks:
  aion_default:
    external: true
